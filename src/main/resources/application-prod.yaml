spring:
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

    consumer:
      group-id: tracking-service
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.protobuf.KafkaProtobufDeserializer

    listener:
      ack-mode: record

    properties:
      schema.registry.url: ${SPRING_SCHEMA_REGISTRY_URL}

      basic.auth.credentials.source: USER_INFO
      schema.registry.basic.auth.user.info: ${SPRING_SCHEMA_REGISTRY_API_KEY}:${SPRING_SCHEMA_REGISTRY_SECRET}

      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${SPRING_KAFKA_API_KEY}" password="${SPRING_KAFKA_API_SECRET}";
      specific.protobuf.value.type:
        com.danijelsudimac.shipmentservice.model.event.ShipmentCreatedEvent
application:
  notification-service:
    url: https://notification-service:8080