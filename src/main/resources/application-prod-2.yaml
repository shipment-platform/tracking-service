spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL_2}
    username: ${SPRING_DATASOURCE_USERNAME_2}
    password: ${SPRING_DATASOURCE_PASSWORD_2}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
  cloud:
    aws:
      region:
        static: us-east-2
app:
  sqs-consumer:
    enabled: true
  kafka-consumer:
    enabled: false
aws:
  sqs:
    shipments-queue-name: ${SPRING_AWS_TOPIC_NAME}